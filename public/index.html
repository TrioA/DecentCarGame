<body>

  <div id="loading">
    <div class="loading-text">Loading...</div>
  </div>

  <!-- Garage Menu -->
  <div id="garage-menu">
    <div class="garage-content">
      <h1 class="garage-title">Car Customization</h1>

      <div class="color-option">
        <label class="color-label">Rim Color:</label>
        <input type="color" id="garageRimColorPicker" class="color-input" value="#cccccc">
      </div>

      <div class="color-option">
        <label class="color-label">Spoiler Color:</label>
        <input type="color" id="garageSpoilerColorPicker" class="color-input" value="#ff0000">
      </div>

      <div class="color-option">
        <label class="color-label">Bottom Half:</label>
        <input type="color" id="garageBottomColorPicker" class="color-input" value="#ff0000">
      </div>

      <div class="color-option">
        <label class="color-label">Top Half:</label>
        <input type="color" id="garageTopColorPicker" class="color-input" value="#ff0000">
      </div>

      <div class="matte-option">
        <input type="checkbox" id="garageMatteToggle" class="matte-toggle">
        <label class="matte-label">Matte Finish (vs Glossy)</label>
      </div>

      <div class="matte-option">
        <input type="checkbox" id="animalSpawnToggle" class="matte-toggle">
        <label class="matte-label">Matte Finish (vs Glossy)</label>
      </div>

      <button id="startDriveBtn" class="start-btn">START DRIVING</button>
    </div>
  </div>

  <div id="hud">
    <div class="hud-cluster-wrapper">
      <div id="engine-broken-overlay">
        <div class="alert-message">⚠ ENGINE DESTROYED (MONEY SHIFT)</div>
        <div class="alert-info">Press R to Reset</div>
      </div>

      <canvas id="hud-gauge-canvas" width="480" height="220"></canvas>

      <div class="hud-gear-digital">
        <div class="gear-lbl">GEAR</div>
        <div id="digital-gear-value">1</div>
      </div>
    </div>
  </div>

  <canvas id="game-canvas"></canvas>

  <button id="settingsBtn"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
      stroke="currentColor" class="size-6">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-9.75 0h9.75" />
    </svg>
  </button>

  <div id="settingsMenu">
    <h1>SETTINGS</h1><br>
    <hr><br>
    <!-- Graphics Section -->
    <!-- Bloom toggle -->
    <h2>Toggle bloom <input id="toggleBloom" checked type="checkbox" class="setting-checkbox"></h2><br>
    <!-- Anti aliasing toggle -->
    <h2>Toggle anti aliasing <input id="toggleAA" checked type="checkbox" class="setting-checkbox"></h2><br>
    <!-- Shadows toggle -->
    <h2>Toggle shadows <input id="toggleShadows" checked type="checkbox" class="setting-checkbox"></h2><br>
    <!-- Sky box toggle -->
    <h2>Toggle sky box <input id="toggleSkyBox" checked type="checkbox" class="setting-checkbox"></h2><br>
    <!-- Toggle fog -->
    <h2>Toggle fog <input id="toggleFog" checked type="checkbox" class="setting-checkbox"></h2><br>
    <br><br>
    <button id="closeSettingsBtn">Close</button>
  </div>

  <script type="importmap">
    {
        "imports": {
            "three": "https://esm.sh/three@latest",
            "three/addons/": "https://esm.sh/three@latest/examples/jsm/",
            "cannon-es": "https://esm.sh/cannon-es@latest",
            "postprocessing": "https://esm.sh/postprocessing@6.35.6"
        }
    }
    </script>
  <script type="module" src="./script.js"></script>
</body>

</html>
